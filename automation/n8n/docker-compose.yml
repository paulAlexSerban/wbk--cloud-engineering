version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678" # Expose n8n on port 5678
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - DB_TYPE=sqlite
      - DB_SQLITE_DATABASE=/data/sqlite/database.sqlite
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
    volumes:
      - ./data/sqlite:/data/sqlite # Mount SQLite database folder
    restart: unless-stopped